<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>First C++ Games — README</title>
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.css" />
<style>
  body { margin: 0; background: #0d1117; color: #c9d1d9;
         font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  .topbar {
    position: sticky; top: 0; z-index: 1;
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 10px 20px;
  }
  .topbar a { color: #8ab4ff; text-decoration: none; font-size: .95rem; }
  .topbar a:hover { text-decoration: underline; }
  .markdown-body {
    box-sizing: border-box; max-width: 860px;
    margin: 0 auto; padding: 32px 20px 80px;
    background: transparent;
  }
  .markdown-body img { background: transparent; }
</style>
<!--uxpolish-->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🕹️%3C/text%3E%3C/svg%3E">
<meta property="og:type" content="website">
<meta property="og:title" content="First C++ Games — README">
<meta property="og:url" content="https://woodyhoko.github.io/First_Cpp_games/readme.html">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#0b0f19">

<style id="uxpolish-css">
::selection{background:rgba(56,189,248,.55);color:#fff}
*{-webkit-tap-highlight-color:transparent}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(56,189,248,.35);border-radius:8px;border:3px solid #0b0f19}
::-webkit-scrollbar-thumb:hover{background:rgba(56,189,248,.6)}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid #38bdf8;outline-offset:2px}
</style>
</head>
<body>
  <div class="topbar"><a href="./">← Back to the games</a></div>
  <article id="content" class="markdown-body">Loading README…</article>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    marked.setOptions({ gfm: true, breaks: false });
    fetch("./README.md")
      .then((r) => { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then((md) => { document.getElementById("content").innerHTML = marked.parse(md); })
      .catch((e) => {
        document.getElementById("content").innerHTML =
          "<p>Couldn't load the README here. " +
          "View it on <a href='https://github.com/woodyhoko/First_Cpp_games#readme'>GitHub</a> instead.</p>" +
          "<pre>" + String(e) + "</pre>";
      });
  </script>
</body>
</html>
